# Self-contained CI (no dependency on mattermost org reusable workflows)
name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      # plugin.json → webapp/src/manifest.ts (gitignored locally; required for tsc)
      - name: Apply manifest
        run: make apply

      - name: Go test
        run: cd server && go test -count=1 ./...

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Webapp install & verify
        run: |
          cd webapp
          npm ci
          npm run check-types
          npm run lint
          npm test
          npm run build

      - name: Full plugin bundle
        run: make dist
